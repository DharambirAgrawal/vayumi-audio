<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vayumi Audio</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1115;
    color: #e6e6e6;
    margin: 0;
    padding: 2rem 1rem;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 640px;
    background: #181b22;
    border: 1px solid #2a2e38;
    border-radius: 12px;
    padding: 1.5rem;
  }
  h1 { margin-top: 0; font-size: 1.4rem; }
  .status { font-size: 0.85rem; color: #8a8f9c; margin-bottom: 1rem; }
  .status.ok { color: #4ade80; }
  .status.err { color: #f87171; }
  label { display: block; margin: 0.75rem 0 0.25rem; font-size: 0.85rem; color: #aab1c0; }
  textarea, select, input {
    width: 100%;
    background: #0f1115;
    color: #e6e6e6;
    border: 1px solid #2a2e38;
    border-radius: 8px;
    padding: 0.5rem 0.6rem;
    font-size: 0.95rem;
  }
  textarea { min-height: 90px; resize: vertical; }
  .row { display: flex; gap: 0.75rem; }
  .row > div { flex: 1; }
  .actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
  button {
    flex: 1;
    padding: 0.6rem 1rem;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    cursor: pointer;
    background: #3b82f6;
    color: white;
  }
  button.secondary { background: #2a2e38; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .log {
    margin-top: 1rem;
    font-size: 0.8rem;
    color: #aab1c0;
    white-space: pre-wrap;
    font-family: ui-monospace, SFMono-Regular, monospace;
  }
  audio { width: 100%; margin-top: 1rem; }
</style>
</head>
<body>
<div class="card">
  <h1>Vayumi Audio</h1>
  <div class="status" id="status">checking server...</div>

  <label for="text">Text</label>
  <textarea id="text">Hello! This is the Vayumi audio service.</textarea>

  <div class="row">
    <div>
      <label for="voice">Voice</label>
      <select id="voice"></select>
    </div>
    <div>
      <label for="speed">Speed (<span id="speedVal">1.0</span>)</label>
      <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0" />
    </div>
    <div>
      <label for="lang">Lang</label>
      <input type="text" id="lang" value="en-us" />
    </div>
  </div>

  <div class="actions">
    <button id="genBtn">Generate</button>
    <button id="streamBtn" class="secondary">Stream</button>
  </div>

  <audio id="player" controls></audio>
  <div class="log" id="log"></div>
</div>

<script>
const statusEl = document.getElementById("status");
const voiceEl = document.getElementById("voice");
const speedEl = document.getElementById("speed");
const speedValEl = document.getElementById("speedVal");
const langEl = document.getElementById("lang");
const textEl = document.getElementById("text");
const genBtn = document.getElementById("genBtn");
const streamBtn = document.getElementById("streamBtn");
const player = document.getElementById("player");
const logEl = document.getElementById("log");

function log(msg) {
  logEl.textContent = msg;
}

speedEl.addEventListener("input", () => {
  speedValEl.textContent = speedEl.value;
});

async function init() {
  try {
    const health = await fetch("/health").then((r) => r.json());
    statusEl.textContent = `model_loaded: ${health.model_loaded}`;
    statusEl.className = "status ok";
  } catch (e) {
    statusEl.textContent = "server unreachable";
    statusEl.className = "status err";
  }

  try {
    const { voices } = await fetch("/voices").then((r) => r.json());
    voiceEl.innerHTML = voices.map((v) => `<option value="${v}">${v}</option>`).join("");
    voiceEl.value = voices.includes("af_heart") ? "af_heart" : voices[0];
  } catch (e) {
    voiceEl.innerHTML = `<option value="af_heart">af_heart</option>`;
  }
}

function requestBody() {
  return JSON.stringify({
    text: textEl.value,
    voice: voiceEl.value,
    speed: parseFloat(speedEl.value),
    lang: langEl.value,
  });
}

async function generate() {
  genBtn.disabled = true;
  const start = performance.now();
  try {
    const res = await fetch("/tts", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: requestBody(),
    });
    if (!res.ok) throw new Error(await res.text());
    const blob = await res.blob();
    const totalMs = (performance.now() - start).toFixed(0);
    player.src = URL.createObjectURL(blob);
    player.play();
    log(`/tts done in ${totalMs}ms (${blob.size} bytes)`);
  } catch (e) {
    log(`Error: ${e.message}`);
  } finally {
    genBtn.disabled = false;
  }
}

async function stream() {
  streamBtn.disabled = true;
  const start = performance.now();
  let firstByteMs = null;

  try {
    const res = await fetch("/tts/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: requestBody(),
    });
    if (!res.ok) throw new Error(await res.text());

    const sampleRate = parseInt(res.headers.get("X-Sample-Rate") || "24000", 10);
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const reader = res.body.getReader();
    let playTime = ctx.currentTime;
    let bytes = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      if (firstByteMs === null) firstByteMs = (performance.now() - start).toFixed(0);

      bytes += value.byteLength;
      const view = new DataView(value.buffer, value.byteOffset, value.byteLength);
      const samples = value.byteLength / 2;
      const float32 = new Float32Array(samples);
      for (let i = 0; i < samples; i++) {
        float32[i] = view.getInt16(i * 2, true) / 32768;
      }

      const buffer = ctx.createBuffer(1, float32.length, sampleRate);
      buffer.copyToChannel(float32, 0);
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.connect(ctx.destination);
      const startAt = Math.max(playTime, ctx.currentTime);
      source.start(startAt);
      playTime = startAt + buffer.duration;
    }

    const totalMs = (performance.now() - start).toFixed(0);
    log(`/tts/stream first chunk in ${firstByteMs}ms, total ${totalMs}ms (${bytes} bytes)`);
  } catch (e) {
    log(`Error: ${e.message}`);
  } finally {
    streamBtn.disabled = false;
  }
}

genBtn.addEventListener("click", generate);
streamBtn.addEventListener("click", stream);
init();
</script>
</body>
</html>
